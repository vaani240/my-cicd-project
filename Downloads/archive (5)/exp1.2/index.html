<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Money</title>
</head>
<style>
    body{
        font-family: 'Times New Roman', Times, serif;
        margin: 200px;
        display: flex;
        align-items: center;
        background-color: antiquewhite;
    }
    .container{
        max-width: 400px;
        margin: auto;
        padding: 50px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
        background: lavenderblush;
    }

    label {
        font-size: 25px;
        font-weight: bold;
    }
    input{
     width: 100%;
    height: 55px;              
    padding: 12px 15px;        
    font-size: 18px;           
    border-radius: 10px;
    border: 2px solid #e0e0e0;
    box-sizing: border-box;


    }
    button{
        padding: 10px 20px;
        font-size: 18px;
        margin-right: 10px        
    }
    .container .cont{
        align-items: center;
        display: flex;
        justify-content: center;
        margin: 20px auto;
    }



.deposit {
    color: white;
    background-color: rgb(39, 13, 167);
    
}

.withdraw {
    color: white;
    background-color: rgb(214, 40, 40);
}

    

</style>
<body>
    <div class="container">
    <p id="message"></p>
    <h1>Balance: $1000</h1>
    <label>Amount</label><br>
    <input 
    type="number" 
    id="amount" 
    placeholder="Enter amount"
    min="1"
    step="1"
/>

    <br><br>
    <div class="cont">
    <button class="deposit" onclick="deposit()">Deposit</button>    
    <button class="withdraw" onclick="withdraw()">Withdraw</button>
    </div>
    </div>
</body>

<script>
    let balance = 1000;

    function updateBalance() {
        document.querySelector("h1").textContent = `Balance: $${balance}`;
    }

    function deposit() {
        const amount = Number(document.getElementById("amount").value);
        const message = document.getElementById("message");

        if (amount <= 0) {
            message.textContent = "Invalid amount";
            message.style.color = "red";
            return;
        }

        balance += amount;
        updateBalance();
        message.textContent =   `Amount sucessufully deposited.`;    ;
        message.style.color = "green";
        document.getElementById("amount").value = '';
    }

    function withdraw() {
        const amount = Number(document.getElementById("amount").value);
        const message = document.getElementById("message");

        if (amount <= 0) {
            message.textContent = "Invalid amount";
            message.style.color = "red";
            return;
        }

        if (amount > balance) {
            message.textContent = "Insufficient funds";
            message.style.color = "red";
            return;
        }

        balance -= amount;
        updateBalance();
        message.textContent = `Amount withdrawn successfully.`;
        message.style.color = "green";
        document.getElementById("amount").value = '';
    }
</script>
</html>
